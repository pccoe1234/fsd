<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="py-4">
    <div class="container text-center">
        <h1 class="mb-0">Student Performance Dashboard</h1>
    </div>
</header>

<main class="container py-4">

    <div class="dropdown-box card shadow-sm border-0 mb-4">
        <div class="card-body text-center">
            <label class="form-label fw-semibold">Select Student:</label>
            <select id="studentSelect" class="form-select w-auto mx-auto">
                <option value="0">Student 1</option>
                <option value="1">Student 2</option>
                <option value="2">Student 3</option>
            </select>
        </div>
    </div>

    <div class="card dashboard-card">
        <h2>Marks in Different Subjects</h2>
        <div id="barChart" class="chart"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Grade Distribution</h2>
        <div id="pieChart" class="pie-container"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Progress Over Time</h2>
        <div id="lineChart" class="chart"></div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
