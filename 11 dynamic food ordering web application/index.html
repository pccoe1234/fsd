<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Ordering App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Food Ordering Application</h1>
  <div>
    Cart Items: <span id="cartCount">0</span>
  </div>
</header>

<div class="buttons">
  <button onclick="filterFood('all')">All</button>
  <button onclick="filterFood('snacks')">Snacks</button>
  <button onclick="filterFood('meals')">Meals</button>
  <button onclick="filterFood('beverages')">Beverages</button>
</div>

<div class="container" id="foodList"></div>

<h2>Your Cart</h2>
<div id="cartItems"></div>

<h3>Total Bill: Rs <span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

<script src="script.js"></script>
</body>
</html>
