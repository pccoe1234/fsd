<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracking Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="py-4">
    <div class="container text-center">
        <h1 class="mb-0">Fitness Tracking Dashboard</h1>
    </div>
</header>

<main class="container py-4">

    <div class="filter-box card shadow-sm border-0 mb-4">
        <div class="card-body text-center">
            <label class="form-label fw-semibold">Select Week:</label>

            <select id="weekSelect" class="form-select w-auto mx-auto">
                <option value="0">Week 1</option>
                <option value="1">Week 2</option>
                <option value="2">Week 3</option>
            </select>
        </div>
    </div>

    <div class="card dashboard-card">
        <h2>Daily Steps Burned</h2>
        <div id="lineChart" class="chart"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Activity Distribution</h2>
        <div id="pieChart" class="pie-container"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Weekly Comparison</h2>
        <div id="barChart" class="chart"></div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
