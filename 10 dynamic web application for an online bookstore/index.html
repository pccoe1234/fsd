<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookstore</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="bg-dark text-white py-4">
  <div class="page-wrap">
    <div class="d-lg-flex justify-content-between align-items-center text-center text-lg-start">
      <h1 class="h2 mb-3 mb-lg-0">BookStore</h1>
      <div class="filters d-flex flex-wrap justify-content-center gap-2">
        <button class="btn btn-outline-light" onclick="filterBooks('all')">All</button>
        <button class="btn btn-outline-light" onclick="filterBooks('fiction')">Fiction</button>
        <button class="btn btn-outline-light" onclick="filterBooks('nonfiction')">Non-Fiction</button>
        <button class="btn btn-outline-light" onclick="filterBooks('academic')">Academic</button>
      </div>
    </div>
  </div>
</header>

<main class="py-4">
  <div class="page-wrap">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="row g-4 book-grid" id="book-list"></div>
      </div>

      <div class="col-lg-4">
        <div class="cart shadow-sm h-100">
          <h3>Cart</h3>
          <ul id="cart-items"></ul>
          <h4>Total: ₹<span id="total">0</span></h4>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>

</body>
</html>
