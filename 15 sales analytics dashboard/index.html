<!DOCTYPE html>
<html>
<head>
    <title>Sales Analytics Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="py-4">
    <div class="container text-center">
        <h1 class="mb-0">Sales Analytics Dashboard</h1>
    </div>
</header>

<main class="container py-4">

    <div class="filter-box card shadow-sm border-0 mb-4">
        <div class="card-body text-center">
            <label class="form-label fw-semibold">Select Month:</label>

            <select id="monthSelect" class="form-select w-auto mx-auto">
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
            </select>
        </div>
    </div>

    <div class="card dashboard-card">
        <h2>Monthly Sales Trend</h2>
        <div id="lineChart" class="chart"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Category Wise Sales</h2>
        <div id="barChart" class="chart"></div>
    </div>

    <div class="card dashboard-card">
        <h2>Revenue Distribution</h2>
        <div id="pieChart" class="pie-container"></div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
