<!DOCTYPE html>


<head>
    <title>HTML Form Elements Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Student Registration Form</h1>
    <p>Please fill the form using different HTML form elements</p>

    <form>

        <!-- Personal Details -->
        <fieldset>
            <legend>Personal Details</legend>

            <label>Full Name:</label>
            <br>
            <input type="text" placeholder="Enter your name">
            <br><br>

            <label>Email:</label>
            <br>
            <input type="email" placeholder="Enter your email">
            <br><br>

            <label>Phone Number:</label>
            <br>
            <input type="tel" placeholder="Enter your phone number">
            <br><br>

        </fieldset>

        <br>

        <!-- Gender -->
        <fieldset>
            <legend>Gender</legend>

            <input type="radio" name="gender" value="male">
            <label>Male</label><br>

            <input type="radio" name="gender" value="female">
            <label>Female</label><br>

            <input type="radio" name="gender" value="other">
            <label>Other</label>

        </fieldset>

        <br>

        <!-- Hobbies -->
        <fieldset>
            <legend>Hobbies</legend>

            <input type="checkbox" value="reading">
            <label>Reading</label><br>

            <input type="checkbox" value="sports">
            <label>Sports</label><br>

            <input type="checkbox" value="music">
            <label>Music</label><br>

            <input type="checkbox" value="travel">
            <label>Travel</label>

        </fieldset>

        <br>

        <!-- Course Selection -->
        <fieldset>
            <legend>Course Details</legend>

            <label>Select Course:</label>
            <br>
            <select>
                <option>Computer Engineering</option>
                <option>IT Engineering</option>
                <option>Mechanical</option>
                <option>Civil</option>
            </select>

            <br><br>

            <label>Address:</label><br>
            <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>

        </fieldset>

        <br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
