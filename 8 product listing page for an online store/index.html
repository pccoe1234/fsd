<!DOCTYPE html>
<html>
<head>
    <title>Product Listing Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">ShopZone</a>
        <div class="navbar-nav ms-auto flex-row gap-3">
            <a class="nav-link text-white" href="#">Electronics</a>
            <a class="nav-link text-white" href="#">Clothes</a>
            <a class="nav-link text-white" href="#">Shoes</a>
            <a class="nav-link text-white" href="#">Accessories</a>
        </div>
    </div>
</nav>

<section class="py-4">
    <div class="bootstrap-wrap">
        <div class="filter text-center mb-4">
            <h3 class="mb-3">Products</h3>

            <select class="form-select w-auto mx-auto">
                <option>Sort by Price</option>
                <option>Low to High</option>
                <option>High to Low</option>
            </select>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Smartphone">
                    <div class="card-body text-center">
                        <h3 class="h5">Smartphone</h3>
                        <p>₹15,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Laptop">
                    <div class="card-body text-center">
                        <h3 class="h5">Laptop</h3>
                        <p>₹55,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Headphones">
                    <div class="card-body text-center">
                        <h3 class="h5">Headphones</h3>
                        <p>₹2,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Shoes">
                    <div class="card-body text-center">
                        <h3 class="h5">Shoes</h3>
                        <p>₹2,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Watch">
                    <div class="card-body text-center">
                        <h3 class="h5">Watch</h3>
                        <p>₹2,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/200" class="card-img-top" alt="Bag">
                    <div class="card-body text-center">
                        <h3 class="h5">Bag</h3>
                        <p>₹2,000</p>
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 ShopZone | Contact: shop@gmail.com</p>
</footer>

</body>
</html>
