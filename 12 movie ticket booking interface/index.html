<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="py-4">
  <div class="page-wrap">
    <div class="text-center mb-4">
      <h2 class="title mb-2">Movie Booking System</h2>
      <p class="text-muted mb-0">Select a movie, choose your seats, and confirm the booking.</p>
    </div>

    <section class="mb-4">
      <h3 class="section-title text-center mb-3">Movies</h3>
      <div class="row g-4" id="movies"></div>
    </section>

    <hr>

    <section class="mb-4">
      <h3 class="section-title text-center mb-3">Select Seats</h3>
      <div class="seat-container" id="seats"></div>
    </section>

    <hr>

    <section class="summary-box text-center">
      <h3 class="section-title mb-3">Booking Summary</h3>
      <p class="mb-2">Selected Seats: <span id="selectedSeats">None</span></p>
      <p class="mb-3">Total Price: Rs <span id="total">0</span></p>
      <button class="btn btn-primary px-4" onclick="book()">Book Now</button>
    </section>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
