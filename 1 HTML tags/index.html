<!DOCTYPE html>
<html>

<head>
    <title>Text Formatting Tags</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>HTML Text Formatting Tags</h1>

    <table>
        <tr>
            <th>Tag</th>
            <th>Description</th>
            <th>Example</th>
        </tr>

        <tr>
            <td>&lt;b&gt;</td>
            <td>Bold text</td>
            <td><b>Bold Text</b></td>
        </tr>

        <tr>
            <td>&lt;i&gt;</td>
            <td>Italic text</td>
            <td><i>Italic Text</i></td>
        </tr>

        <tr>
            <td>&lt;u&gt;</td>
            <td>Underline text</td>
            <td><u>Underline Text</u></td>
        </tr>

        <tr>
            <td>&lt;mark&gt;</td>
            <td>Highlighted text</td>
            <td><mark>Highlight</mark></td>
        </tr>

        <tr>
            <td>&lt;sub&gt;</td>
            <td>Subscript text</td>
            <td>H<sub>2</sub>O</td>
        </tr>

        <tr>
            <td>&lt;sup&gt;</td>
            <td>Superscript text</td>
            <td>X<sup>2</sup></td>
        </tr>

        <tr>
            <td>&lt;del&gt;</td>
            <td>Deleted text</td>
            <td><del>Deleted</del></td>
        </tr>

        <tr>
            <td>&lt;ins&gt;</td>
            <td>Inserted text</td>
            <td><ins>Inserted</ins></td>
        </tr>
    </table>

</body>
</html>
